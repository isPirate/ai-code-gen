server:
  port: 8888
  servlet:
    context-path: /api

spring:
  application:
    name: ai-code-gen
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code_gen
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  profiles:
    active: local

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: cn.pirate.aicodegen.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
